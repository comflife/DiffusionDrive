_target_: navsim.agents.diffusiondrive.transfuser_agent_ar.TransfuserAgentAR
_convert_: 'all'

config:
  _target_: navsim.agents.diffusiondrive.transfuser_config.TransfuserConfig
  _convert_: 'all'

  trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: 'all'
    time_horizon: 4
    interval_length: 0.5

  latent: False
  
  # Discrete AR specific configurations
  ego_vocab_size: 512
  ego_vocab_path: /home/byounggun/DiffusionDrive/codebook_cache/navsim_kdisk_v512/ego.npy
  agent_topk: 8
  agent_context_dim: 256
  temperature: 0.0  # default greedy; override with +agent.config.temperature=0.8 for stochastic sampling in AR head
  ar_num_modes: 1
  ar_token_loss_weight: 1.0
  ar_traj_loss_weight: 8.0
  ar_heading_loss_weight: 2.0
  ar_use_residual_delta: true
  ar_use_heading_head: true
  ar_codebook_mode: step_delta
  ar_match_heading_weight: 1.0
  ar_teacher_forcing: true
  ar_step_aware_agent: false
  ar_use_ego_cross_attn: false
  ar_use_deformable_bev: false
  ckpt_save_top_k: 3
  ckpt_monitor: val/loss
  trunk_lr_mult: 1.0
  freeze_pretrained_trunk: true

checkpoint_path: /home/byounggun/DiffusionDrive/diffusiondrive_navsim_88p1_PDMS
checkpoint_save_dir: ${output_dir}/checkpoints
lr: 2e-4
